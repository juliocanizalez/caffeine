name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: macos-latest

    permissions:
      contents: write

    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            archive: caffeine-aarch64-apple-darwin.tar.gz
          - target: x86_64-apple-darwin
            archive: caffeine-x86_64-apple-darwin.tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.archive }} caffeine

      - name: Compute SHA256
        run: shasum -a 256 ${{ matrix.archive }} | tee ${{ matrix.archive }}.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          generate_release_notes: true

  update-changelog:
    name: Update CHANGELOG
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Prepend release section to CHANGELOG.md
        env:
          TAG: ${{ github.ref_name }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          # Find the tag that comes directly before TAG in semver order
          PREV_TAG=$(git tag --sort=version:refname | grep -v "^${TAG}$" | awk -v t="${TAG}" '$0 < t' | tail -1)
          RANGE="${PREV_TAG:+${PREV_TAG}..}${TAG}"

          {
            echo "## [${TAG}] - ${DATE}"
            echo ""
            git log --pretty=format:"- %s" ${RANGE} \
              | grep -v "^- build(release)" \
              | grep -v "^- chore(release)" \
              | grep -v "^- docs(changelog)"
            echo ""
            echo ""
            echo "---"
            echo ""
          } > /tmp/new_section.md

          # Insert after the <!-- next-release --> marker
          awk '/<!-- next-release -->/{print; print ""; while((getline line < "/tmp/new_section.md") > 0) print line; next} {print}' CHANGELOG.md > CHANGELOG.tmp
          mv CHANGELOG.tmp CHANGELOG.md

      - name: Commit CHANGELOG
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs(changelog): add ${TAG} release notes"
          # Rebase to handle concurrent pushes from other release jobs
          git pull --rebase origin main && git push

  update-homebrew-tap:
    name: Update Homebrew tap
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Fetch checksums from release
        id: checksums
        env:
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE="https://github.com/juliocanizalez/caffeine/releases/download/${TAG}"
          ARM_SHA=$(curl -fsSL "${BASE}/caffeine-aarch64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          X86_SHA=$(curl -fsSL "${BASE}/caffeine-x86_64-apple-darwin.tar.gz.sha256" | awk '{print $1}')
          VERSION="${TAG#v}"
          echo "arm_sha=${ARM_SHA}" >> "$GITHUB_OUTPUT"
          echo "x86_sha=${X86_SHA}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}"  >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: juliocanizalez/homebrew-tap
          ssh-key: ${{ secrets.TAP_DEPLOY_KEY }}
          path: homebrew-tap

      - name: Update formula
        env:
          VERSION: ${{ steps.checksums.outputs.version }}
          ARM_SHA: ${{ steps.checksums.outputs.arm_sha }}
          X86_SHA: ${{ steps.checksums.outputs.x86_sha }}
        run: |
          FORMULA="homebrew-tap/Formula/caffeine.rb"
          sed -i "s/version \".*\"/version \"${VERSION}\"/" "$FORMULA"
          # Update arm sha256 (line after on_arm do)
          awk -v arm="$ARM_SHA" -v x86="$X86_SHA" '
            /on_arm do/   { print; found_arm=1; next }
            found_arm && /sha256/ { sub(/"[a-f0-9]+"/, "\"" arm "\""); found_arm=0 }
            /on_intel do/ { print; found_x86=1; next }
            found_x86 && /sha256/ { sub(/"[a-f0-9]+"/, "\"" x86 "\""); found_x86=0 }
            { print }
          ' "$FORMULA" > "$FORMULA.tmp" && mv "$FORMULA.tmp" "$FORMULA"

      - name: Commit and push
        working-directory: homebrew-tap
        env:
          VERSION: ${{ steps.checksums.outputs.version }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/caffeine.rb
          git commit -m "build(formula): bump caffeine to v${VERSION}"
          git push
